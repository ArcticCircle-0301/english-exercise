<script>
// ===================== JSONBIN 配置 =====================
const JB_KEY = JSONBIN_API_KEY;
const JB_HEADERS = {'X-Master-Key': JB_KEY, 'Content-Type': 'application/json', 'X-Bin-Private': 'false'};

// Data bins - will be created on first run
let USERS_BIN_ID = localStorage.getItem('jb_users_bin') || '';
let RECORDS_BIN_ID = localStorage.getItem('jb_records_bin') || '';
let BLOCKLIST_BIN_ID = localStorage.getItem('jb_blocklist_bin') || '';
let SCORES_BIN_ID = localStorage.getItem('jb_scores_bin') || '';

// ===================== JSONBIN HELPER =====================
async function jbGet(binId){
  let r;
  try{r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{'X-Master-Key':JB_KEY}});}
  catch(e){throw new Error('网络请求失败，请用浏览器直接打开此页面（不要在微信内打开）。');}
  if(!r.ok) throw new Error('读取数据失败('+r.status+')');
  return (await r.json()).record;
}
async function jbPut(binId, data){
  let r;
  try{r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:'PUT',headers:JB_HEADERS,body:JSON.stringify(data)});}
  catch(e){throw new Error('网络请求失败，请用浏览器直接打开此页面（不要在微信内打开）。');}
  if(!r.ok) throw new Error('写入数据失败('+r.status+')');
  return await r.json();
}
async function jbCreate(data){
  let r;
  try{
    r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:JB_HEADERS,body:JSON.stringify(data)});
  }catch(e){
    // Network error - try alternative approach or show clear message
    throw new Error('网络请求失败，请尝试用浏览器（Chrome/Safari）直接打开此页面，不要在微信内打开。如仍有问题请截图反馈。');
  }
  if(!r.ok){
    const errText=await r.text();
    console.error('JSONBin error:',r.status,errText);
    throw new Error('数据服务暂时不可用（错误码:'+r.status+'），请稍后再试或用浏览器直接打开。');
  }
  const j=await r.json();
  return j.metadata.id;
}

async function ensureBins(){
  if(!USERS_BIN_ID){
    const id=await jbCreate([{_init:true}]);
    USERS_BIN_ID=id;
    localStorage.setItem('jb_users_bin',id);
  }
  if(!RECORDS_BIN_ID){
    const id=await jbCreate([{_init:true}]);
    RECORDS_BIN_ID=id;
    localStorage.setItem('jb_records_bin',id);
  }
  if(!BLOCKLIST_BIN_ID){
    const id=await jbCreate([{_init:true}]);
    BLOCKLIST_BIN_ID=id;
    localStorage.setItem('jb_blocklist_bin',id);
  }
  if(!SCORES_BIN_ID){
    const id=await jbCreate([{_i:1}]);
    SCORES_BIN_ID=id;
    localStorage.setItem('jb_scores_bin',id);
  }
}

// Helper: filter out init entries and get clean array
function cleanArr(arr){return arr.filter(x=>!x._init)}
// Helpers for each data type
async function getUsers(){return cleanArr(await jbGet(USERS_BIN_ID))}
async function getRecords(){return cleanArr(await jbGet(RECORDS_BIN_ID))}
async function getBlocklist(){return cleanArr(await jbGet(BLOCKLIST_BIN_ID))}
async function saveUsers(arr){await jbPut(USERS_BIN_ID, arr)}
async function saveRecords(arr){await jbPut(RECORDS_BIN_ID, arr)}
async function saveBlocklist(arr){await jbPut(BLOCKLIST_BIN_ID, arr)}
async function getScores(){return ca(await jbGet(SCORES_BIN_ID))}
async function saveScores(arr){await jbPut(SCORES_BIN_ID, arr)}

// ===================== STATE =====================
let currentUser = null;
let isAdmin = false;
const S = {module:'vocab',unit:null,qIdx:0,answered:false,selIdx:null,answers:{},completed:{},phraseOpts:{},sessionStart:null,qStartTime:null,qTimedOut:false,totalTimeouts:0,unitStartTime:null};
let timerInterval=null,rankInterval=null;
const vocabCounts = {1:10,2:10,3:10,4:10,5:10,6:9};
const phraseCounts = {1:9,2:8,3:8,4:8,5:8,6:8};

// ===================== UI HELPERS =====================
function show(el){el.classList.remove('hide')}
function hide(el){el.classList.add('hide')}
function setLoading(v){document.getElementById('loadingEl').classList.toggle('hide',!v)}
function toggleReg(toReg){document.getElementById('loginCard').classList.toggle('hide',toReg);document.getElementById('regCard').classList.toggle('hide',!toReg)}
function showAdminLogin(){hide(document.getElementById('loginPage'));show(document.getElementById('adminLoginPage'))}
function backToUserLogin(){hide(document.getElementById('adminLoginPage'));show(document.getElementById('loginPage'))}

// Simple hash for passwords (not crypto-grade, but sufficient for this use case)
async function hashPass(pass){const enc=new TextEncoder().encode(pass);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// ===================== AUTH =====================
async function doRegister(){
  const name=document.getElementById('rName').value.trim();
  const pass=document.getElementById('rPass').value;
  const pass2=document.getElementById('rPass2').value;
  document.getElementById('regErr').textContent='';
  if(!name){document.getElementById('regErr').textContent='请输入姓名';return}
  if(pass.length<6){document.getElementById('regErr').textContent='密码至少6位';return}
  if(pass!==pass2){document.getElementById('regErr').textContent='两次密码不一致';return}
  setLoading(true);
  try{
    await ensureBins();
    const users=await getUsers();
    if(users.find(u=>u.name===name)){document.getElementById('regErr').textContent='该姓名已被注册';setLoading(false);return}
    const hashed=await hashPass(pass);
    const user={id:'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8), name:name, pass:hashed, role:'student', createdAt:new Date().toISOString(), location:''};
    // Get IP location
    try{const r=await fetch('https://ip.zxinc.org/api.php?type=json');const d=await r.json();user.location=(d.country||'')+(d.province||'')+(d.city||'')}catch(e){}
    users.push(user);
    await saveUsers(users);

async function saveUnitScore(module,unit,score,total,duration,timeoutCount){
  if(!currentUser)return;
  try{const scores=await getScores();
    const idx=scores.findIndex(s=>s.userId===currentUser.id&&s.module===module&&s.unit===unit);
    const entry={userId:currentUser.id,name:currentUser.name,module,unit,score,total,duration,timeoutCount,pct:Math.round(score/total*100),updatedAt:new Date().toISOString()};
    if(idx>=0){const old=scores[idx];if(entry.pct>old.pct||(entry.pct===old.pct&&entry.duration<old.duration)){scores[idx]=entry}}
    else{scores.push(entry)}
    await saveScores(scores);
  }catch(e){console.error('Save score failed:',e)}
}

async function uploadRecord(score,total){

}

function switchMod(mod,el){

  }

function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

async function renderUnitSelection(){
  hide(document.getElementById('quizArea'));hide(document.getElementById('resultArea'));hide(document.getElementById('rankArea'));
  const sel=document.getElementById('unitSel');sel.classList.remove('hide');
  const isV=S.module==='vocab';const counts=isV?vocabCounts:phraseCounts;
  // Get scores for display
  let scores=[];
  try{await ensureBins();scores=await getScores()}catch(e){}
  let html='<div class="ugrid">';
  for(let u=1;u<=6;u++){
    const key=S.module+'-'+u;const done=S.completed[key];
    const myScore=scores.find(s=>s.userId===currentUser.id&&s.module===S.module&&s.unit===u);
    let scoreHtml='';
    if(myScore)scoreHtml=`<div class="uscore">最佳：${myScore.pct}% (${myScore.score}/${myScore.total})</div>`;
    html+=`<div class="ucard${done?' done':''}" onclick="selectUnit(${u})"><div class="un">Unit ${u}</div><div class="ul">${counts[u]} ${isV?'词汇':'短语'}题</div>${scoreHtml}</div>`;
  }
  html+='</div>';sel.innerHTML=html;
}

function selectUnit(unit){
  S.unit=unit;S.qIdx=0;S.answered=false;S.selIdx=null;S.qTimedOut=false;S.totalTimeouts=0;S.unitStartTime=new Date();S.unitDurations=[];
  if(S.module==='vocab'){vocabData[unit]=shuffleArray(vocabData[unit])}else{phraseData[unit]=shuffleArray(phraseData[unit]);generatePhraseOptions(unit)}
  hide(document.getElementById('unitSel'));hide(document.getElementById('rankArea'));show(document.getElementById('quizArea'));renderQuestion();startTimer();
}

function generatePhraseOptions(unit){
  const pool=phrasePools[unit];const qs=phraseData[unit];const map=[];
  for(let i=0;i<qs.length;i++){const correct=qs[i].ca;const distractors=pool.filter(p=>p!==correct);
    const allOpts=shuffleArray([correct,...shuffleArray(distractors).slice(0,3)]);
    map.push({opts:allOpts,correctIdx:allOpts.indexOf(correct)});}
  S.phraseOpts[unit]=map;
}

function getQuestions(){return S.module==='vocab'?vocabData[S.unit]:phraseData[S.unit]}
function getTotalQ(){return getQuestions().length}

function renderQuestion(){
  const qs=getQuestions();const q=qs[S.qIdx];const isV=S.module==='vocab';const total=getTotalQ();
  const pct=((S.qIdx)/total*100).toFixed(0);
  let html=`<div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>`;
  // Timer bar
  html+=`<div class="tbar"><div id="timerFill" class="tfill green" style="width:100%"></div></div>`;
  html+=`<div class="qhead"><span>第 ${S.qIdx+1} / ${total} 题</span><span id="timerDisp" style="font-weight:700">⏱ ${QUESTION_TIMEOUT}s</span><span id="scoreDisp"></span></div>`;
  html+=`<div class="qcard"><div class="qsent">${q.s}</div><div class="olist">`;
  if(isV){
    q.o.forEach((opt,i)=>{let cls='obtn';if(S.answered){cls+=' dis';if(i===q.c)cls='obtn ok dis';else if(i===S.selIdx)cls='obtn no dis'}html+=`<div class="${cls}" onclick="selectAnswer(${i})">${opt}</div>`});
  }else{
    const optsMap=S.phraseOpts[S.unit][S.qIdx];
    optsMap.opts.forEach((opt,i)=>{let cls='obtn';if(S.answered){cls+=' dis';if(i===optsMap.correctIdx)cls='obtn ok dis';else if(i===S.selIdx)cls='obtn no dis'}html+=`<div class="${cls}" onclick="selectAnswer(${i})">${opt}</div>`});
  }
  html+='</div></div>';
  if(S.answered){
    html+=`<div class="anbox"><div class="antog" onclick="this.nextElementSibling.classList.toggle('open')"><i class="fa-solid fa-language"></i> 翻译与解析 <i class="fa-solid fa-chevron-down" style="font-size:.7rem"></i></div>`;
    html+=`<div class="ancon"><p><b>中文翻译：</b>${q.t}</p><p><b>正确答案：</b>${isV?q.o[q.c]:q.ca} — ${q.m}</p>`;
    if(isV&&q.wa){html+=`<p><b>错误选项分析：</b></p><ul style="padding-left:18px">`;q.wa.forEach(w=>html+=`<li>${w}</li>`);html+='</ul>'}
    if(!isV&&q.ep)html+=`<p><b>易错点：</b>${q.ep}</p>`;
    html+='</div></div>';
  }
  if(S.answered&&S.qIdx<total-1)html+=`<div style="text-align:center;margin-top:16px"><button class="btn btn-pri" onclick="nextQ()">下一题 <i class="fa-solid fa-arrow-right"></i></button></div>`;
  document.getElementById('quizArea').innerHTML=html;
  const key=S.module+'-'+S.unit;const rec=S.answers[key]||[];const correct=rec.filter(r=>r).length;
  const sd=document.getElementById('scoreDisp');if(sd)sd.textContent=`✓ ${correct} / ${S.qIdx+1}`;
}

function selectAnswer(idx){
  if(S.answered)return;
  stopTimer();
  const elapsed=Math.round((new Date()-S.qStartTime)/1000);
  S.unitDurations.push(elapsed);
  S.selIdx=idx;S.answered=true;
  const q=getQuestions()[S.qIdx];const isV=S.module==='vocab';
  const correctIdx=isV?q.c:S.phraseOpts[S.unit][S.qIdx].correctIdx;
  const key=S.module+'-'+S.unit;if(!S.answers[key])S.answers[key]=[];
  S.answers[key][S.qIdx]=(idx===correctIdx);
  if(idx===correctIdx)confetti({particleCount:80,spread:70,origin:{y:.7}});
  renderQuestion();
  if(S.qIdx>=getTotalQ()-1)setTimeout(()=>showResult(),1200);
}

function handleTimeout(){
  if(S.answered)return;
  S.answered=true;S.qTimedOut=true;S.totalTimeouts++;
  const elapsed=QUESTION_TIMEOUT;
  S.unitDurations.push(elapsed);
  const key=S.module+'-'+S.unit;if(!S.answers[key])S.answers[key]=[];
  S.answers[key][S.qIdx]=false; // timeout = wrong
  S.selIdx=-1;
  renderQuestion();
  if(S.qIdx>=getTotalQ()-1)setTimeout(()=>showResult(),1200);
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  S.qStartTime=new Date();S.qTimedOut=false;
  const total=QUESTION_TIMEOUT;
  timerInterval=setInterval(()=>{
    if(S.answered)return;
    const elapsed=(new Date()-S.qStartTime)/1000;
    const remaining=total-elapsed;
    if(remaining<=0){clearInterval(timerInterval);handleTimeout();return}
    const pct=Math.max(0,remaining/total*100);
    const fill=document.getElementById('timerFill');
    const disp=document.getElementById('timerDisp');
    if(fill){
      fill.style.width=pct+'%';
      fill.className='tfill '+(remaining>20?'green':remaining>10?'yellow':'red');
    }
    if(disp)disp.innerHTML=`⏱ ${Math.ceil(remaining)}s`;
  },100);
}

function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}

function nextQ(){S.qIdx++;S.answered=false;S.selIdx=null;S.qTimedOut=false;renderQuestion();startTimer()}

async function showResult(){
  stopTimer();
  hide(document.getElementById('quizArea'));
  const key=S.module+'-'+S.unit;const rec=S.answers[key]||[];
  const total=rec.length;const correct=rec.filter(r=>r).length;const pct=Math.round(correct/total*100);
  S.completed[key]=true;
  const totalDuration=S.unitDurations.reduce((a,b)=>a+b,0);
  // Save score
  await saveUnitScore(S.module,S.unit,correct,total,totalDuration,S.totalTimeouts);
  // Upload record
  await uploadRecord(correct,total);
  let emoji='💪';if(pct>=90)emoji='🏆';else if(pct>=75)emoji='🎯';else if(pct>=60)emoji='📚';
  let timeoutMsg='';
  if(S.totalTimeouts>0)timeoutMsg=`<div style="color:var(--warn);font-size:.85rem;margin-top:6px">⚠ 超时 ${S.totalTimeouts} 题（不计分）</div>`;
  document.getElementById('resultArea').innerHTML=`
    <div class="rcard"><div style="font-size:2.5rem">${emoji}</div><div class="rscore">${pct}%</div>
    <div class="rdet">共 ${total} 题，答对 ${correct} 题，答错 ${total-correct} 题<br>用时 ${totalDuration} 秒</div>
    ${timeoutMsg}
    <div class="raction">
      <button class="btn btn-pri btn-sm" onclick="selectUnit(${S.unit})">重做本单元</button>
      <button class="btn btn-out btn-sm" onclick="backToUnits()">返回单元列表</button>
      <button class="btn btn-out btn-sm" onclick="viewMyRank()"><i class="fa-solid fa-ranking-star"></i> 查看排名</button>
    </div></div>`;
  show(document.getElementById('resultArea'));
}

function backToUnits(){S.unit=null;hide(document.getElementById('quizArea'));hide(document.getElementById('resultArea'));show(document.getElementById('unitSel'));renderUnitSelection()}

async function viewMyRank(){

async function renderRank(){
  const area=document.getElementById('rankArea');
  let html=`<div class="rank-section"><div class="rank-title"><i class="fa-solid fa-ranking-star"></i> 排行榜</div>`;
  // Module/unit selector
  html+=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">`;
  html+=`<select id="rankMod" onchange="S._rankMod=this.value;renderRank()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--bd);font-size:.9rem">
    <option value="vocab" ${(!S._rankMod||S._rankMod==='vocab')?'selected':''}>词汇精练</option>
    <option value="phrase" ${S._rankMod==='phrase'?'selected':''}>短语练习</option></select>`;
  html+=`<select id="rankUnit" onchange="S._rankUnit=parseInt(this.value);renderRank()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--bd);font-size:.9rem">`;
  for(let u=1;u<=6;u++)html+=`<option value="${u}" ${(S._rankUnit||1)===u?'selected':''}>Unit ${u}</option>`;
  html+=`</select></div>`;
  try{
    const scores=await getScores();
    const mod=S._rankMod||'vocab';const unit=S._rankUnit||1;
    let filtered=scores.filter(s=>s.module===mod&&s.unit===unit);
    filtered.sort((a,b)=>{if(a.pct!==b.pct)return b.pct-a.pct;return a.duration-b.duration});
    if(!filtered.length){html+=`<div style="text-align:center;color:var(--text3);padding:30px">暂无排名数据</div>`}
    else{
      filtered.forEach((s,i)=>{
        const pos=i+1;
        const isMe=s.userId===currentUser.id;
        let posCls=pos===1?'g1':pos===2?'g2':pos===3?'g3':'';
        html+=`<div class="rank-card${isMe?' rank-me':''}">
          <div class="rank-pos ${posCls}">${pos<=3?['🥇','🥈','🥉'][pos-1]:pos}</div>
          <div class="rank-info"><div class="rank-name">${s.name}${isMe?' (我)':''}</div>
          <div class="rank-meta">用时 ${s.duration}s${s.timeoutCount?' · 超时'+s.timeoutCount+'题':''}</div></div>
          <div class="rank-score">${s.pct}%</div></div>`;
      });
    }
  }catch(e){html+=`<div style="color:var(--err)">加载失败</div>`}
  html+='</div>';
  area.innerHTML=html;
}

function startRankRefresh(){
  if(rankInterval)clearInterval(rankInterval);

  rankInterval=setInterval(async()=>{

  },30000);
}

// Admin: edit score
async function editUserScore(userId,name){
  const scores=await getScores();
  const userScores=scores.filter(s=>s.userId===userId);
  let msg='当前分数：\n';
  userScores.forEach(s=>{msg+=`${s.module==='vocab'?'词汇':'短语'} U${s.unit}: ${s.pct}% (${s.score}/${s.total}) 用时${s.duration}s\n`});
  msg+='\n输入新分数（格式：模块 单元 分数/总数，如 vocab 1 8/10）';
  const input=prompt(msg);
  if(!input)return;
  const parts=input.trim().split(/\s+/);
  if(parts.length<3){alert('格式错误');return}
  const mod=parts[0];const unit=parseInt(parts[1]);const scoreParts=parts[2].split('/');
  const newScore=parseInt(scoreParts[0]);const newTotal=scoreParts.length>1?parseInt(scoreParts[1]):0;
  if(isNaN(newScore)||isNaN(unit)){alert('格式错误');return}
  const pct=newTotal>0?Math.round(newScore/newTotal*100):0;
  const idx=scores.findIndex(s=>s.userId===userId&&s.module===mod&&s.unit===unit);
  if(idx>=0){scores[idx].score=newScore;scores[idx].total=newTotal||scores[idx].total;scores[idx].pct=pct;scores[idx].duration=0;scores[idx].updatedAt=new Date().toISOString()}
  else{scores.push({userId,name,module:mod,unit,score:newScore,total:newTotal||10,duration:0,timeoutCount:0,pct,updatedAt:new Date().toISOString()})}
  await saveScores(scores);
  alert('已更新！');await loadAdminData();
}
